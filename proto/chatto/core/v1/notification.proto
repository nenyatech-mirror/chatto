syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

/*
   Notification is the unified wrapper for all notification types.

   Notifications are stored in the RUNTIME_STATE KV bucket with key format:
   notification.{recipientId}.{notificationId}

   This enables efficient user-scoped queries via prefix filtering.
*/
message Notification {
  // Unique notification identifier (NanoID)
  string id = 1;

  // User who receives this notification
  string recipient_id = 2;

  // When this notification was created
  google.protobuf.Timestamp created_at = 3;

  // User who triggered this notification (message author)
  string actor_id = 4;

  // The concrete notification payload
  oneof notification {
    // ===== NOTIFICATION TYPES (100-199) =====
    DMMessageNotification dm_message = 100;
    MentionNotification mention = 101;
    ReplyNotification reply = 102;
    RoomMessageNotification room_message = 103;
  }
}

// ============================================================================
// NOTIFICATION TYPES
// ============================================================================

// DMMessageNotification is created when someone sends a message in a DM conversation.
// The recipient is any participant in the DM except the sender.
message DMMessageNotification {
  // Room ID of the DM conversation
  string room_id = 1;

  // Event ID of the message
  string event_id = 2;
}

// MentionNotification is created when someone @mentions a user in a message.
// The recipient is the mentioned user.
message MentionNotification {
  reserved 1;
  reserved "space_id";

  // Room where the mention occurred
  string room_id = 2;

  // Event ID of the message containing the mention
  string event_id = 3;

  // Thread root event ID if the mention was on a message inside a thread.
  // Empty for room-level mentions.
  string in_thread = 4;
}

// ReplyNotification is created when someone replies to a user's message.
// The recipient is the original message author.
message ReplyNotification {
  reserved 1;
  reserved "space_id";

  // Room where the reply occurred
  string room_id = 2;

  // Event ID of the reply message
  string event_id = 3;

  // Event ID of the message being replied to (may be thread root or direct reply target)
  string in_reply_to_id = 4;

  // Thread root event ID if this reply was in a thread. Empty for room-level replies.
  string in_thread = 5;
}

// RoomMessageNotification is created for users with ALL_MESSAGES notification level.
// The recipient is any room member with the ALL_MESSAGES level, except the author.
// Only fires for root messages (thread replies do not generate ALL_MESSAGES
// notifications), so no in_thread field is needed.
message RoomMessageNotification {
  reserved 1;
  reserved "space_id";

  // Room where the message was posted
  string room_id = 2;

  // Event ID of the message
  string event_id = 3;
}
