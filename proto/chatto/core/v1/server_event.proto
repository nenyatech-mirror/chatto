syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";
import "chatto/core/v1/live_event.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

/*
   SpaceEvent is the wrapper for all space-scoped events.

   Events are either:
   - Stored in JetStream streams — persisted events
   - Published directly to NATS Core for real-time updates — live events

   Persisted event message definitions are in this file. Changing their field numbers
   or structure affects stored data and requires careful migration.

   Live-only (transient) event message definitions are in live_event.proto. Those can
   be changed freely since they are never persisted.

   Server-scoped events use a separate ServerEvent wrapper (in live_event.proto).

   Authorization is determined by NATS subject, not the wrapper type:
   - Space events: space.{spaceId}.> (JetStream) or live.space.{spaceId}.> (NATS Core)
*/
message ServerEvent {
  // Universal event identifier (NanoID) for forward-compatibility with non-NATS systems
  string id = 1;

  // When this event was created
  google.protobuf.Timestamp created_at = 2;

  // ID of the user who triggered this event
  string actor_id = 3;

  reserved 9001; // was sequence_id (removed — sequence is a JetStream transport detail, not part of the event)

  // The concrete event payload
  oneof event {
    // =================================================================
    // PERSISTED EVENTS (stored in JetStream streams)
    // Changing field numbers or message structure below affects stored
    // data. Message definitions are in this file.
    // =================================================================

    // ----- Room lifecycle (300-309) -----
    RoomCreatedEvent room_created = 300;
    RoomUpdatedEvent room_updated = 301;
    RoomDeletedEvent room_deleted = 302;
    RoomArchivedEvent room_archived = 303;
    RoomUnarchivedEvent room_unarchived = 304;

    // ----- Room membership (310-329) -----
    UserJoinedRoomEvent user_joined_room = 310;
    UserLeftRoomEvent user_left_room = 311;
    SpaceMemberDeletedEvent space_member_deleted = 320;

    // ----- Messages (400-409) -----
    MessagePostedEvent message_posted = 400;
    // Field 403 was ThreadReplyEchoEvent, now folded into MessagePostedEvent

    // =================================================================
    // LIVE-ONLY EVENTS (transient, never persisted)
    // Message definitions are in live_event.proto. Inner message
    // structures can be changed freely, but oneof field numbers below
    // are part of the ServerEvent wire format and must not change.
    // =================================================================

    // ----- Message mutations (401-402) -----
    MessageUpdatedEvent message_updated = 401;
    MessageDeletedEvent message_deleted = 402;

    // ----- Reactions (500-509) — KV is source of truth -----
    ReactionAddedEvent reaction_added = 500;
    ReactionRemovedEvent reaction_removed = 501;

    // ----- Typing indicators (510-519) -----
    UserTypingEvent user_typing = 510;

    // ----- Video processing (520-529) -----
    VideoProcessingCompletedEvent video_processing_completed = 520;

    // ----- Presence (600-609) -----
    PresenceChangedEvent presence_changed = 600;

    // ----- Voice calls (710-719) -----
    CallParticipantJoinedEvent call_participant_joined = 710;
    CallParticipantLeftEvent call_participant_left = 711;
  }

  // Live-only events moved to LiveEvent (live_event.proto).
  // Field numbers reserved for wire-format compatibility with any
  // in-flight messages during migration.
  reserved 100, 110, 111, 112, 113, 114, 120, 121, 200, 201, 202,
           700, 701, 800, 801, 900, 901;
  reserved "config_updated", "user_created", "user_deleted",
           "user_profile_updated", "server_user_preferences_updated",
           "notification_level_changed", "user_joined_space", "user_left_space",
           "space_created", "space_updated", "space_deleted",
           "mention_notification", "new_direct_message_notification",
           "notification_created", "notification_dismissed",
           "new_message_in_space", "room_marked_as_read";
}

// ============================================================================
// PERSISTED EVENT MESSAGE DEFINITIONS
// Changing field numbers or structure below affects JetStream-stored data.
// ============================================================================

// ============================================================================
// ROOM LIFECYCLE EVENTS
// ============================================================================

message RoomCreatedEvent {
  string space_id = 1;
  string room_id = 2;
  string name = 3;
  string description = 4;
}

message RoomUpdatedEvent {
  string space_id = 1;
  string room_id = 2;
  string name = 3;
  string description = 4;
}

message RoomDeletedEvent {
  string space_id = 1;
  string room_id = 2;
}

// RoomArchivedEvent is published when a room is archived.
// Archived rooms are hidden from sidebars and Browse Rooms.
message RoomArchivedEvent {
  string space_id = 1;
  string room_id = 2;
}

// RoomUnarchivedEvent is published when a room is unarchived.
// The room becomes visible again in sidebars and Browse Rooms.
message RoomUnarchivedEvent {
  string space_id = 1;
  string room_id = 2;
}

// ============================================================================
// ROOM MEMBERSHIP EVENTS
// ============================================================================

message UserJoinedRoomEvent {
  string space_id = 1;
  string room_id = 2;
}

message UserLeftRoomEvent {
  string space_id = 1;
  string room_id = 2;
}

// SpaceMemberDeletedEvent is published when a user's account is deleted.
// This notifies all space members that the user is gone, so they can:
// - Update their member lists
// - Refresh messages to show "Deleted User" and unavailable content
message SpaceMemberDeletedEvent {
  string space_id = 1;
  string user_id = 2;
}

// ============================================================================
// MESSAGE EVENTS
// ============================================================================

message MessagePostedEvent {
  // Space ID - required to locate the message body in the correct
  // SPACE_{spaceId}_BODIES KV bucket for lazy-loading
  string space_id = 1;

  // Room ID - identifies which room this message belongs to
  string room_id = 2;

  // Compound key for body storage in KV: {userId}.{eventId}
  // The userId prefix enables efficient per-user filtering for GDPR deletion.
  string message_body_id = 3;

  // Threading: event ID of the message this is replying to (empty = top-level message)
  string in_reply_to = 4;

  // Threading: event ID of the thread root message (empty = top-level message)
  // For direct replies to a root, in_thread == in_reply_to.
  // For nested replies, in_thread references the original root.
  string in_thread = 5;

  // User IDs of users mentioned via @username in the message body.
  // Only includes valid, resolved user IDs (invalid mentions are silently ignored).
  repeated string mentioned_user_ids = 6;

  // Echo fields (empty for regular messages, set for "also send to channel" echoes).
  // When set, this event is an echo of a thread reply — the message body is shared
  // with the original thread reply (same message_body_id), so edits/deletions propagate.

  // Event ID of the original thread reply this echoes (empty = not an echo)
  string echo_of_event_id = 7;

  // Thread root event ID — the thread this echo originates from (empty = not an echo)
  string echo_from_thread_root_event_id = 8;

  // Parent event's ID (populated at read time for resolver access)
  // Used for reactions lookup since reactions are keyed by event ID
  string event_id = 1001;

  reserved 1000; // was sequence_id (dead field, never read)
}
