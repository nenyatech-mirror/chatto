syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// RoomKind discriminates between channel rooms and direct-message rooms.
// Determines KV partitioning (room.channel.* vs room.dm.*) and NATS
// subject routing (server.room.channel.* vs server.room.dm.*).
enum RoomKind {
  // Default for legacy rooms written before the field existed. Treat as
  // CHANNEL after boot-time backfill (see ADR-030).
  ROOM_KIND_UNSPECIFIED = 0;
  ROOM_KIND_CHANNEL = 1;
  ROOM_KIND_DM = 2;
}

// Room represents a chat room on the server.
// For channel rooms, group_id MUST point to a RoomGroup; DM rooms leave it empty.
message Room {
  string id = 1;
  // Field 2 was `space_id` — a legacy "server"/"DM" discriminator
  // wire-frozen for KV-stored bytes. The concept of spaces was
  // removed post-ADR-030 (replaced by `kind`), and the field was
  // kept around as a deprecated wire-compat hack longer than needed.
  // Removed entirely; callers that need the legacy partition key
  // compute it on-demand via `core.LegacySpaceIDForRoomKind(kind)`.
  reserved 2;
  reserved "space_id";
  string name = 3;
  string description = 4;
  bool archived = 5;
  // Field 6 was `auto_join`. Removed: membership is now strictly
  // explicit (users join via `joinRoom` or admin mass-invite). The
  // tag is reserved to prevent accidental reuse.
  reserved 6;
  reserved "auto_join";
  // group_id is the RoomGroup this room belongs to. Required for channel
  // rooms, empty for DM rooms. See ADR-031.
  string group_id = 7;
  // Canonical kind discriminator.
  RoomKind kind = 8;
  // Universal channel rooms grant effective membership to every server member
  // who is currently eligible to join the room. Explicit memberships are
  // preserved separately so disabling universal restores the previous state.
  bool universal = 9;
}

// User represents a user account
message User {
  string id = 1;
  string login = 2; // Unique login identifier
  string display_name = 3;
  // Avatar state is projected from AssetCreatedEvent/UserAvatarClearedEvent.
  google.protobuf.Timestamp created_at = 4; // When the user was created (null for users created before this field was added)
  bool deleted = 5; // True for public tombstones representing deleted/unresolvable users.
}

// VerifiedEmail represents a single email address that has been verified
// for a user. Stored in the INSTANCE KV bucket with key
// "verified_emails.{userId}.{sha256(lowercase(email))}", one entry per
// (user, email) pair. The hash in the key keeps emails representable in
// NATS subject tokens and provides case-insensitive uniqueness; the
// raw address is preserved in the value for display.
message VerifiedEmail {
  string email = 1;
  google.protobuf.Timestamp verified_at = 2;
}

// AuditRequestMetadata captures request details that are safe to persist in
// auth audit facts and auth-adjacent runtime records. Raw IP addresses, links,
// and tokens never belong here.
message AuditRequestMetadata {
  string user_agent = 1;
  string ip_hash = 2;
}

// CookieSession is the server-side runtime-state record for the embedded SPA's
// HTTP cookie session. The raw session ID is never stored in this payload; it is
// represented only by the HMAC-derived RUNTIME_STATE key.
message CookieSession {
  string user_id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp expires_at = 3;
  string source = 4;
  AuditRequestMetadata request = 5;
  uint64 auth_generation = 6;
}

// DeprecatedAsset is the storage-pointer-only proto used for legacy values:
// branding KV entries, avatar pointers on UserAvatarSetEvent, and the
// Storage field on legacy embedded Attachment protos. Wire format matches
// the original `Asset` message it replaced; keep it for decode of historical
// bytes. New writes use AssetRecord (richer content metadata) and emit
// AssetCreatedEvent for owner / lifecycle context.
message DeprecatedAsset {
  oneof asset {
    NATSAsset nats = 2;
    S3Asset s3 = 1;
  }
}

message S3Asset {
  string key = 1;
  optional string bucket = 2; // If absent, use configured default bucket
}

message NATSAsset {
  string key = 1;
}

// AssetRecord is durable content metadata for one uploaded or generated
// binary. Storage and intrinsic media metadata live here; ownership and
// derivation context live on AssetCreatedEvent.
message AssetRecord {
  // Unique identifier (NanoID).
  string id = 1;

  // Original filename.
  string filename = 2;

  // MIME type (e.g., "image/jpeg", "video/mp4").
  string content_type = 3;

  // File size in bytes.
  int64 size = 4;

  // Media dimensions when known.
  int32 width = 5;
  int32 height = 6;

  // Media duration in milliseconds when known.
  int64 duration_ms = 7;

  // Media bitrate in bits per second when known.
  int32 bitrate = 8;

  // Storage location for the binary data.
  oneof storage {
    NATSAsset nats = 10;
    S3Asset s3 = 11;
  }
}

message RoomMembership {
  string user_id = 1;
  reserved 2; // was space_id, redundant with KV bucket name
  string room_id = 3;
}

// Role represents a named set of permissions.
message Role {
  string name = 1; // Unique identifier, lowercase + dashes only, e.g., "owner", "moderator", "content-reviewer"
  string display_name = 2; // Human-readable name, e.g., "Owner", "Moderator", "Content Reviewer"
  string description = 3;
  int32 position = 4; // Display/order position; not an authorization rank.
  bool pingable = 5; // Whether messages can ping users assigned to this role.
}

// UserPresenceStatus indicates a user's online presence status.
// Named to avoid conflict with the GraphQL PresenceStatus enum.
// Note: OFFLINE is not stored - absence of a key means offline.
enum UserPresenceStatus {
  USER_PRESENCE_STATUS_UNSPECIFIED = 0;
  USER_PRESENCE_STATUS_ONLINE = 1;
  USER_PRESENCE_STATUS_AWAY = 2;
  USER_PRESENCE_STATUS_DO_NOT_DISTURB = 3;
}

// UserPresence represents a user's current live presence status.
// Stored under presence.{userId} in MEMORY_CACHE.
message UserPresence {
  UserPresenceStatus status = 1;
}

// PresenceChange represents a change in a user's presence status.
// Used by GraphQL subscriptions - the `user` field is resolved separately.
message PresenceChange {
  string user_id = 1;
  string status = 2; // GraphQL PresenceStatus enum value (ONLINE, OFFLINE, AWAY, DO_NOT_DISTURB)
}

// ThreadMetadata stores aggregated information about a message thread.
// Stored in KV bucket SPACE_{spaceId}_THREADS with key {roomId}.{rootEventId}.
// Updated via optimistic locking when replies are posted.
message ThreadMetadata {
  // Event ID of the thread root message
  string root_event_id = 1;

  // Number of replies in this thread
  int32 reply_count = 2;

  // Timestamp of the most recent reply
  google.protobuf.Timestamp last_reply_at = 3;

  // Unique user IDs of participants who have replied (capped at 50)
  repeated string participant_ids = 4;
}

// Attachment is the legacy embedded representation of a message attachment.
// New posts store only attachment IDs on MessageBody and emit
// AssetCreatedEvent records for each; this proto is retained so historical
// MessageBody payloads remain decodable. Remove in post-migration cleanup
// once all legacy embedded records have been backfilled and archived.
message Attachment {
  // Unique identifier for this attachment (NanoID)
  string id = 1;

  // Field 2 (`space_id`) was the pre-ADR-030-Phase-4 "server"/"DM"
  // discriminator embedded in legacy S3 keys. Retired in 2026-05;
  // canonical storage location lives on the `storage` field instead.
  // Reserved so the field number can't be reused.
  reserved 2;
  reserved "space_id";

  // Room ID where this attachment was posted (for authorization)
  string room_id = 3;

  // Original filename
  string filename = 4;

  // MIME type (e.g., "image/jpeg", "video/mp4")
  string content_type = 5;

  // File size in bytes
  int64 size = 6;

  // Image dimensions (0 for non-image files)
  int32 width = 7;
  int32 height = 8;

  // Storage location for the attachment binary data.
  // If not set (nil), defaults to NATS ObjectStore for backwards compatibility.
  DeprecatedAsset storage = 9;

  // Compound key (`{userId}.{bodyId}`) of the MessageBody that owns this
  // attachment. Set when the body is written in PostMessage; also
  // populated on read in the GraphQL resolver for legacy bodies that
  // predate this field. Used to construct signed attachment URLs that
  // the HTTP handler can verify and route without a separate index
  // lookup. Empty for attachments that don't belong to a body (e.g.
  // video variants and thumbnails, which carry their parent video's
  // attachment ID in their URL locator instead).
  string message_body_id = 10;
}

// MessageBody stores the encrypted content and body-owned metadata of a
// message. New bodies are carried by MessageBodyEvent so the encrypted
// payload can be securely deleted while preserving public timeline facts.
// Message bodies are always encrypted. Legacy bodies use the author's per-user
// ChaCha20-Poly1305 key directly. V2 bodies use a per-user message-body DEK
// epoch directly.
message MessageBody {
  string author_id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;

  // Encryption envelope version. Empty/0 means legacy v1 direct per-user-key
  // encryption for backward compatibility with historical bodies. Version 2
  // means XChaCha20-Poly1305 body encryption with the author's referenced
  // message-body DEK epoch.
  int32 encryption_version = 4;
  // V2: per-user message-body DEK epoch that encrypted this body.
  int32 content_key_epoch = 5;
  // Event envelope ID of the MessageBodyEvent carrying this body. Included in
  // AAD for new body-event-carried bodies to prevent replaying old encrypted
  // body payloads under new body events.
  string body_event_id = 6;

  // Encrypted message body ciphertext with auth tag. For legacy bodies this
  // is ChaCha20-Poly1305. For v2 envelope bodies this uses the referenced
  // message-body DEK.
  bytes encrypted_body = 20;
  // Nonce for encrypted_body: 12 bytes for legacy ChaCha20-Poly1305, 24 bytes
  // for v2 XChaCha20-Poly1305.
  bytes encryption_nonce = 21;

  // Legacy embedded attachment protos. Older bodies (and the legacy
  // import path) carry full Attachment records here. New bodies write
  // asset_ids instead and the GraphQL resolver hydrates from the
  // asset projection (see AssetCreatedEvent). Keep this field for decode
  // until every historical body has been backfilled into the projection.
  repeated Attachment attachments = 30;

  // Ordered list of asset IDs referenced by this message. Source of truth
  // for new bodies; their content metadata + storage live on AssetRecord /
  // AssetCreatedEvent in the projection. Each ID points at an asset that
  // was created (via AssetCreatedEvent) before the message was posted —
  // typically by an UploadAsset call from the same actor.
  repeated string asset_ids = 31;

  // Link preview extracted from the first URL in the message body
  LinkPreview link_preview = 40;
}

// LinkPreview stores OpenGraph/oEmbed metadata for a URL in a message.
message LinkPreview {
  // The original URL that was previewed
  string url = 1;

  // OpenGraph metadata
  string title = 2;
  string description = 3;
  string site_name = 4;

  // Asset ID for the preview image. Kept for GraphQL/client compatibility;
  // new previews also carry image_asset with storage metadata.
  optional string image_asset_id = 5;

  // Embed type: "generic", "youtube", "vimeo", etc.
  string embed_type = 6;

  // Embed ID for rich embeds (e.g., YouTube video ID)
  optional string embed_id = 7;

  // Preview image content metadata and storage pointer.
  AssetRecord image_asset = 8;
}

// CachedLinkPreview wraps LinkPreview with cache metadata.
// Stored in LINK_PREVIEW_CACHE KV bucket.
message CachedLinkPreview {
  // The original URL (for verification)
  string url = 1;

  // The preview data (nil if fetch failed)
  LinkPreview preview = 2;

  // Whether the fetch failed (for negative caching)
  bool fetch_failed = 3;

  // Reason for failure (e.g., "timeout", "ssrf_blocked", "no_og_tags")
  string error_reason = 4;

  // When this cache entry was created (Unix timestamp)
  int64 fetched_at_unix = 5;
}

// Visual + permission organization of channel rooms (see ADR-031).
//
// Storage layout:
//   - `room_layout` (one KV entry) holds the authoritative *ordering*
//     of groups as `group_ids` — a list of NanoIDs. This is the only
//     field new writes touch.
//   - `room_group.{id}` (one KV entry per group) holds each group's
//     properties (name, description, room_ids, future visual fields).
//   - Reads go through a reconciler: layout entries with no matching
//     group doc are dropped; group docs missing from the layout are
//     appended (orphan recovery). The layout is a hint, not a source
//     of truth for "which groups exist".
//
// Current writes only ever set `group_ids`. The legacy fields are retained for
// wire compatibility with older backups/clients.
message RoomLayout {
  // legacy_sections is the on-the-wire compatible read for the
  // pre-split shape (main's `repeated RoomLayoutSection sections`).
  // RoomLayoutSection's fields (id=1, name=2, room_ids=3) are a prefix
  // of RoomGroup's, so the same wire bytes decode cleanly here; the
  // extra RoomGroup fields (e.g. description) simply stay zero. The
  // migrator drains this on first boot after the split lands and
  // never writes to it again.
  repeated RoomGroup legacy_sections = 1 [deprecated = true];

  // legacy_unsorted_room_ids carried rooms that weren't assigned to
  // any section in main's pre-split shape. The migrator absorbs these
  // into the first group (or a freshly-seeded "Lobby" group).
  repeated string legacy_unsorted_room_ids = 2 [deprecated = true];

  // Authoritative ordering of groups. Each entry references a
  // `room_group.{id}` document.
  repeated string group_ids = 3;
}

// A RoomGroup is a named, ordered collection of channel rooms that also
// serves as a permission container (see ADR-031). Each room group has
// its own ACL; individual rooms can override per (role, permission)
// entries on top. Stored at `room_group.{id}`.
message SidebarLink {
  string id = 1;     // NanoID for stable identity across renames/moves
  string label = 2;  // Display label shown in the server sidebar
  string url = 3;    // Absolute http(s) URL or server-local path starting with /
}

message SidebarGroupEntry {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    ROOM = 1;
    SIDEBAR_LINK = 2;
  }

  Kind kind = 1;
  string id = 2; // Room ID for ROOM, SidebarLink ID for SIDEBAR_LINK
}

message RoomGroup {
  string id = 1;                    // NanoID for stable identity across renames
  string name = 2;                  // Display name (e.g., "General", "Projects")
  repeated string room_ids = 3;     // Ordered list of room IDs in this group
  string description = 4;           // Optional operator-facing description
  // Ordered mixed sidebar entries. ROOM entries reference Room records by ID;
  // SIDEBAR_LINK entries reference payloads in sidebar_links by ID.
  repeated SidebarGroupEntry entries = 5;

  // Link payloads owned by this group. Kept separate from entries so reorders
  // can move stable IDs without duplicating mutable label/URL data.
  repeated SidebarLink sidebar_links = 6;
}

// ============================================================================
// VIDEO PROCESSING
// ============================================================================

// VideoProcessingState tracks the async processing state of a video attachment.
// Legacy entries were stored in SERVER_RUNTIME at key "video.{attachmentId}".
// New durable completed/failed manifests live in AssetProcessing* EVT events;
// this shape remains for transient worker progress.
message VideoProcessingState {
  // Current processing status
  VideoStatus status = 1;

  // Attachment ID of the generated poster/thumbnail image
  string thumbnail_attachment_id = 2;

  // Video duration in milliseconds
  int64 duration_ms = 3;

  // Original video dimensions
  int32 width = 4;
  int32 height = 5;

  // Error message if processing failed
  string error_message = 6;

  // Processed video variants (different quality levels)
  repeated VideoVariant variants = 7;

  // Full Attachment proto for the generated thumbnail image. Source of
  // truth for the thumbnail's storage location, filename, dimensions,
  // etc. The `thumbnail_attachment_id` field above mirrors
  // `thumbnail_attachment.id` and is kept around for back-compat reads.
  Attachment thumbnail_attachment = 8;
}

enum VideoStatus {
  // buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
  VIDEO_STATUS_PENDING = 0;
  VIDEO_STATUS_PROCESSING = 1;
  VIDEO_STATUS_COMPLETED = 2;
  VIDEO_STATUS_FAILED = 3;
}

message VideoVariant {
  // Attachment ID of this variant. Mirrors `attachment.id` and is kept
  // for back-compat reads.
  string attachment_id = 1;

  // Quality label (e.g., "720p", "480p")
  string quality = 2;

  // Dimensions of this variant
  int32 width = 3;
  int32 height = 4;

  // File size in bytes
  int64 size = 5;

  // Full Attachment proto for this variant. Source of truth for the
  // variant's storage location and metadata. The HTTP handler reads
  // `storage` from here when serving the variant binary.
  Attachment attachment = 6;
}
