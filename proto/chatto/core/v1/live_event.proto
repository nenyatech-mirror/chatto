syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";
import "chatto/core/v1/user_preferences.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

/*
   Live-only event message definitions.

   These events are published directly to NATS Core, bypassing JetStream
   storage entirely. They are NEVER persisted to streams.

   Because these events are transient (never stored), their field numbers
   and structure can be changed freely without data migration concerns.
   The KV bucket is the source of truth where applicable.

   Persisted server events live in ServerEvent (server_event.proto).
   Live-only events are wrapped in LiveEvent (below).
*/

/*
   LiveEvent is the wrapper for all live-only events.

   These are published directly to NATS Core (never persisted). There is no
   JetStream storage for them, so there are no wire-compatibility constraints
   on this wrapper or its inner messages.

   Authorization is determined by NATS subject:
   - User-scoped live events: live.server.user.{userId}.{eventType}
   - Space-scoped live events: live.server.space.{spaceId}.{eventType}
*/
message LiveEvent {
  // Universal event identifier (NanoID)
  string id = 1;

  // When this event was created
  google.protobuf.Timestamp created_at = 2;

  // ID of the user who triggered this event
  string actor_id = 3;

  // The concrete event payload
  oneof event {
    // ----- Server config -----
    ServerConfigUpdatedEvent config_updated = 100;

    // ----- User lifecycle -----
    UserCreatedEvent user_created = 110;
    UserDeletedEvent user_deleted = 111;
    UserProfileUpdatedEvent user_profile_updated = 112;
    ServerUserPreferencesUpdatedEvent server_user_preferences_updated = 113;
    NotificationLevelChangedEvent notification_level_changed = 114;
    ThreadFollowChangedEvent thread_follow_changed = 115;

    // ----- Space membership (instance-level) -----
    UserJoinedSpaceEvent user_joined_space = 120;
    UserLeftSpaceEvent user_left_space = 121;

    // ----- Space lifecycle -----
    SpaceCreatedEvent space_created = 200;
    SpaceUpdatedEvent space_updated = 201;
    SpaceDeletedEvent space_deleted = 202;

    // ----- Notifications -----
    MentionNotificationEvent mention_notification = 700;
    NewDirectMessageNotificationEvent new_direct_message_notification = 701;
    NotificationCreatedEvent notification_created = 800;
    NotificationDismissedEvent notification_dismissed = 801;

    // ----- Space unread indicators -----
    NewMessageInSpaceEvent new_message_in_space = 900;
    RoomMarkedAsReadEvent room_marked_as_read = 901;

    // ----- Room layout (space-scoped instance event) -----
    RoomLayoutUpdatedEvent room_layout_updated = 330;

    // ----- Session termination -----
    SessionTerminatedEvent session_terminated = 400;
  }
}

// ============================================================================
// SERVER CONFIG EVENTS (Live-only)
// ============================================================================

// Notifies clients that server configuration was updated.
// Clients should refetch server info to get the new values.
message ServerConfigUpdatedEvent {
  // The updated server name
  string server_name = 1;

  // The updated MOTD (empty if cleared)
  string motd = 2;

  // The updated welcome message (empty if cleared)
  string welcome_message = 3;

  // The updated blocked usernames (newline-separated, empty if cleared)
  string blocked_usernames = 4;
}

// ============================================================================
// USER LIFECYCLE EVENTS (Live-only, server-scoped)
// ============================================================================

message UserCreatedEvent {
  string user_id = 1;
  string login = 2;
  string display_name = 3;
}

// UserDeletedEvent is published when a user deletes their own account.
// This is an instance-level event for audit logging and admin UI updates.
message UserDeletedEvent {
  string user_id = 1;
}

// UserProfileUpdatedEvent is published when a user's profile changes.
// This includes avatar uploads/deletions, display name changes, and login changes.
// Allows other users to see profile changes in real-time.
message UserProfileUpdatedEvent {
  string user_id = 1;
  string display_name = 2;
  // URL to the user's avatar, or empty if no avatar is set.
  string avatar_url = 3;
  // The user's current login/username.
  string login = 4;
}

// ============================================================================
// USER PREFERENCE EVENTS (Live-only, user-scoped)
// ============================================================================

// ServerUserPreferencesUpdatedEvent is published when a user updates their display preferences.
// This is a user-scoped private event for multi-tab/multi-device sync.
message ServerUserPreferencesUpdatedEvent {
  // IANA timezone name (empty = cleared/browser default).
  string timezone = 1;
  // Time display format preference.
  TimeFormat time_format = 2;
}

// NotificationLevelChangedEvent is published when a user changes their notification
// level for a space or room. User-scoped: only delivered to the user who changed it.
message NotificationLevelChangedEvent {
  // The space whose notification level was changed.
  string space_id = 1;
  // The room whose notification level was changed (empty for space-level changes).
  string room_id = 2;
  // The explicitly set level.
  NotificationLevel level = 3;
  // The effective level after inheritance resolution.
  NotificationLevel effective_level = 4;
}

// ============================================================================
// SPACE MEMBERSHIP EVENTS (Live-only, server-scoped) -- retired; messages
// retained for proto field-number stability but no longer published.
// ============================================================================

message UserJoinedSpaceEvent {
  string space_id = 1;
}

message UserLeftSpaceEvent {
  string space_id = 1;
}

// ============================================================================
// SPACE LIFECYCLE EVENTS (Live-only, server-scoped)
// ============================================================================

message SpaceCreatedEvent {
  string space_id = 1;
  string name = 2;
  string description = 3;
}

message SpaceUpdatedEvent {
  string space_id = 1;
  string name = 2;
  string description = 3;
  // URL to the space's logo, or empty if no logo is set.
  string logo_url = 4;
  // URL to the space's banner, or empty if no banner is set.
  string banner_url = 5;
}

message SpaceDeletedEvent {
  string space_id = 1;
}

// ============================================================================
// MESSAGE MUTATION EVENTS (Live-only, space-scoped)
// ============================================================================

message MessageUpdatedEvent {
  // Space ID - required to locate the message body in the correct
  // SPACE_{spaceId}_BODIES KV bucket for lazy-loading
  string space_id = 1;

  // Room ID - identifies which room this message belongs to
  string room_id = 2;

  reserved 3; // was sequence_id (dead field, never read)

  // Compound key for body storage in KV: {userId}.{eventId}
  // The userId prefix enables efficient per-user filtering for GDPR deletion.
  string message_body_id = 4;

  // Threading: event ID of the message this is replying to (empty = top-level message)
  string in_reply_to = 5;

  // Threading: event ID of the thread root message (empty = top-level message)
  string in_thread = 6;

  // Event ID of the updated message (for GraphQL API consumers).
  // Populated at publish time from the body key.
  string message_event_id = 7;

  // Parent event's ID (populated at read time for resolver access)
  // Used for reactions lookup since reactions are keyed by event ID
  string event_id = 1000;
}

message MessageDeletedEvent {
  // Space ID - identifies which space the message belonged to
  string space_id = 1;

  // Room ID - identifies which room the message belonged to
  string room_id = 2;

  // Compound key for body storage in KV: {userId}.{eventId}
  // The userId prefix enables efficient per-user filtering for GDPR deletion.
  string message_body_id = 3;

  // Event ID of the deleted message (for GraphQL API consumers).
  // Populated at publish time from the body key.
  string message_event_id = 4;
}

// ============================================================================
// REACTION EVENTS (Live-only, space-scoped - KV bucket is source of truth)
// ============================================================================

message ReactionAddedEvent {
  // Space ID - identifies the space containing the message
  string space_id = 1;

  // Room ID - identifies the room containing the message
  string room_id = 2;

  // Event ID of the message being reacted to (NanoID)
  string message_event_id = 3;

  // The emoji used for the reaction (Unicode emoji string)
  string emoji = 4;
}

message ReactionRemovedEvent {
  // Space ID - identifies the space containing the message
  string space_id = 1;

  // Room ID - identifies the room containing the message
  string room_id = 2;

  // Event ID of the message the reaction was removed from (NanoID)
  string message_event_id = 3;

  // The emoji that was removed
  string emoji = 4;
}

// ============================================================================
// TYPING INDICATOR EVENTS (Live-only, space-scoped)
// ============================================================================

// Notifies clients that a user is typing in a room or thread.
// Published directly to NATS Core (bypasses JetStream storage).
// Clients should implement timeout-based clearing (e.g., 6 seconds).
message UserTypingEvent {
  // Space ID where the user is typing
  string space_id = 1;

  // Room ID where the user is typing
  string room_id = 2;

  // Thread root event ID (optional). If set, the user is typing a reply in this thread.
  // If empty, the user is typing in the main room view.
  optional string thread_root_event_id = 3;
}

// ============================================================================
// PRESENCE EVENTS (Live-only, space-scoped, constructed from KV watcher)
// ============================================================================

// Notifies clients that a user's presence status changed.
// Published when a user comes online, goes offline, or changes their status.
// The user whose presence changed is identified by the parent SpaceEvent's actor_id.
// Presence is server-wide; the space context is implicit in the subscription.
message PresenceChangedEvent {
  // The user's new presence status ("ONLINE", "OFFLINE", "AWAY", "DO_NOT_DISTURB")
  string status = 1;
}

// ============================================================================
// NOTIFICATION EVENTS (Live-only, server-scoped, KV tracks persistent state)
// ============================================================================

// Notifies a user that they were mentioned in a message.
// Published as a live server event to the mentioned user.
// This is a transient notification - KV bucket tracks persistent state.
message MentionNotificationEvent {
  // Space ID where the mention occurred
  string space_id = 1;

  // Room ID where the mention occurred
  string room_id = 2;

  // User ID of the person who mentioned them (the message author)
  string mentioned_by_user_id = 3;
}

// Notifies a user that a new message was posted in a DM conversation they're part of.
// Published as a live server event to all participants except the sender.
// Every DM message triggers this notification (unlike mentions which are opt-in).
message NewDirectMessageNotificationEvent {
  // Room ID of the DM conversation
  string room_id = 1;

  // User ID of the person who sent the message
  string sender_id = 2;
}

// ============================================================================
// NOTIFICATION SYNC EVENTS (Live-only, server-scoped)
// ============================================================================

// Published when a new notification is created for a user.
// Enables real-time notification updates in the UI.
message NotificationCreatedEvent {
  // The notification ID
  string notification_id = 1;

  // Navigation context (optional fields for routing)
  string space_id = 2;
  string room_id = 3;
  string event_id = 4;
  string in_reply_to_id = 5;
}

// Published when a notification is dismissed by the user.
// Enables cross-device sync of dismissed notifications.
message NotificationDismissedEvent {
  // The dismissed notification ID
  string notification_id = 1;
}

// ============================================================================
// THREAD FOLLOW EVENTS (Live-only, user-scoped)
// ============================================================================

// ThreadFollowChangedEvent is published when a user's thread follow state changes
// (follow or unfollow, including auto-follow on posting). User-scoped: delivered
// only to the user whose follow state changed, for multi-tab/multi-device sync.
message ThreadFollowChangedEvent {
  // The space containing the thread.
  string space_id = 1;
  // The room containing the thread.
  string room_id = 2;
  // The root event ID of the thread.
  string thread_root_event_id = 3;
  // Whether the user is now following (true) or not following (false).
  bool is_following = 4;
}

// ============================================================================
// SPACE UNREAD EVENTS (Live-only, server-scoped)
// ============================================================================

// Published to all members of a space (except the author) when a new message is posted.
// This lightweight event enables real-time unread indicators on space icons without
// requiring per-space subscriptions.
message NewMessageInSpaceEvent {
  // Space ID where the message was posted
  string space_id = 1;

  // Room ID where the message was posted
  string room_id = 2;
}

// Published to the user who marked a room as read.
// This enables real-time updates to space unread indicators when the user
// reads rooms within a space.
message RoomMarkedAsReadEvent {
  // Space ID containing the room
  string space_id = 1;

  // Room ID that was marked as read
  string room_id = 2;
}

// ============================================================================
// ROOM LAYOUT EVENTS (Live-only, server-scoped - KV bucket is source of truth)
// ============================================================================

// Notifies clients that the room layout for a space was updated.
// Clients should refetch the room layout to get the new order/sections.
// Published as a live server event (not stored in JetStream).
message RoomLayoutUpdatedEvent {
  // Space ID whose room layout was updated
  string space_id = 1;
}

// ============================================================================
// SESSION TERMINATION EVENTS (Live-only, user-scoped)
// ============================================================================

// Notifies a user that their session has been terminated.
// Published as a user-scoped server event on logout or admin boot.
// The subscription handler closes the stream after forwarding this event,
// ensuring the WebSocket connection is torn down server-side.
message SessionTerminatedEvent {
  // Reason for termination: "logout", "admin_boot", "account_deleted"
  string reason = 1;
}

// ============================================================================
// VIDEO PROCESSING EVENTS (Live-only, space-scoped)
// ============================================================================

// Notifies clients that video processing has completed (or failed) for an attachment.
// Published on live.space.{spaceId}.video.processed so room subscribers receive it.
message VideoProcessingCompletedEvent {
  // Space ID containing the video
  string space_id = 1;

  // Room ID containing the message with the video
  string room_id = 2;

  // Attachment ID of the original video
  string attachment_id = 3;

  // Message body ID (internal, used by core for KV lookups)
  string message_body_id = 4;

  // Event ID of the message containing the attachment (for GraphQL API consumers).
  // Populated at publish time from the body key.
  string message_event_id = 5;
}

// ============================================================================
// VOICE CALL EVENTS (Live-only, space-scoped)
// ============================================================================

// Notifies room members that a user joined a voice call.
// Published as a live space event when a user requests a call token.
message CallParticipantJoinedEvent {
  string space_id = 1;
  string room_id = 2;
}

// Notifies room members that a user left a voice call.
// Published as a live space event when a user explicitly leaves.
message CallParticipantLeftEvent {
  string space_id = 1;
  string room_id = 2;
}
