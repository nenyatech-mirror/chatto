syntax = "proto3";

package chatto.core.v1;

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// TimeFormat controls how times are displayed to the user.
enum TimeFormat {
  // Not set - use browser/locale default.
  TIME_FORMAT_UNSPECIFIED = 0;
  // 12-hour format (e.g., 2:30 PM).
  TIME_FORMAT_12H = 1;
  // 24-hour format (e.g., 14:30).
  TIME_FORMAT_24H = 2;
}

// NotificationLevel controls how a user receives notifications for a space or room.
// Stored per-user per-space (and optionally per-room) in the space's CONFIG KV bucket.
enum NotificationLevel {
  // Use inherited default (space default for rooms, NORMAL for spaces).
  NOTIFICATION_LEVEL_DEFAULT = 0;
  // Suppress all notifications and unread markers.
  NOTIFICATION_LEVEL_MUTED = 1;
  // Standard behavior: unread markers + notifications for mentions/DMs/threads.
  NOTIFICATION_LEVEL_NORMAL = 2;
  // Like NORMAL, plus a notification for every new root message in the room.
  NOTIFICATION_LEVEL_ALL_MESSAGES = 3;
}

// ServerUserPreferences stores per-user display preferences at the server level.
// Stored in INSTANCE KV bucket with key "user_preferences.{userId}" (legacy
// names retained per ADR-029).
// All fields are optional - absence means "use browser/locale default".
message ServerUserPreferences {
  // IANA timezone name (e.g., "America/New_York", "Europe/Berlin").
  // If absent or empty, the frontend uses the browser's local timezone.
  optional string timezone = 1;

  // Preferred time display format.
  // TIME_FORMAT_UNSPECIFIED means the frontend uses the browser's locale default.
  TimeFormat time_format = 2;
}

// SpaceUserPreferences stores per-user preferences for a space.
// Stored in SPACE_{spaceId}_CONFIG KV bucket with key "user_preferences.{userId}".
message SpaceUserPreferences {
  // Notification level for the space (DEFAULT = inherit system default of NORMAL).
  NotificationLevel notification_level = 1;
}

// RoomUserPreferences stores per-user preferences for a room within a space.
// Stored in SPACE_{spaceId}_CONFIG KV bucket with key "room_user_preferences.{userId}.{roomId}".
message RoomUserPreferences {
  // Notification level for the room (DEFAULT = inherit from space preference).
  NotificationLevel notification_level = 1;
}
