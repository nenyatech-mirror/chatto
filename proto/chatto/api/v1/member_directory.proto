syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/pagination.proto";
import "chatto/api/v1/users.proto";
import "google/protobuf/timestamp.proto";

// Public user/member profile used by directory and mention surfaces.
message DirectoryMember {
  // Public profile and live presence fields.
  UserProfile profile = 1;
  // Explicit roles assigned to the user. Member listings include the virtual
  // `everyone` role for parity with Chatto's permission model.
  repeated string roles = 2;
  // Account creation time when known.
  google.protobuf.Timestamp created_at = 3;
}

// Request for server members visible to the authenticated user.
message ListServerMembersRequest {
  reserved 2, 3;
  reserved "limit", "offset";

  // Optional case-insensitive search against login and display name.
  string search = 1 [(buf.validate.field).string.max_len = 100];
  // Page request. Defaults to 20 results when absent or limit is zero.
  PageRequest page = 4;
}

// Server member page.
message ListServerMembersResponse {
  reserved 2, 3;
  reserved "total_count", "has_more";

  // Members in the requested page.
  repeated DirectoryMember members = 1;
  // Page metadata.
  PageInfo page = 4;
}

// Request one authenticated server member by stable user ID.
message GetServerMemberRequest {
  // Required target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Server member response.
message GetServerMemberResponse {
  // Requested member.
  DirectoryMember member = 1;
}

// Request server member rows for a set of stable user IDs.
message BatchGetServerMembersRequest {
  // Required target user IDs. Unknown IDs are omitted from the response.
  repeated string user_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      string: {min_len: 1}
    }
  }];
}

// Batch server member response.
message BatchGetServerMembersResponse {
  // Found members. The server preserves first-seen request order and
  // de-duplicates repeated IDs.
  repeated DirectoryMember members = 1;
}

// Request for members of one room.
message ListRoomMembersRequest {
  reserved 3, 4;
  reserved "limit", "offset";

  // Required. Room whose explicit members should be listed.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Optional case-insensitive search against login and display name.
  string search = 2 [(buf.validate.field).string.max_len = 100];
  // Page request. Defaults to 20 results when absent or limit is zero.
  PageRequest page = 5;
}

// Room member page.
message ListRoomMembersResponse {
  reserved 2, 3;
  reserved "total_count", "has_more";

  // Members in the requested page.
  repeated DirectoryMember members = 1;
  // Page metadata.
  PageInfo page = 4;
}

// Request one member of one room by stable user ID.
message GetRoomMemberRequest {
  // Required room ID.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required target user ID.
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
}

// Room member response.
message GetRoomMemberResponse {
  // Requested room member.
  DirectoryMember member = 1;
}

// Request room member rows for a set of stable user IDs.
message BatchGetRoomMembersRequest {
  // Required room ID.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required target user IDs. Unknown IDs and users that are not members of the
  // room are omitted from the response.
  repeated string user_ids = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      string: {min_len: 1}
    }
  }];
}

// Batch room member response.
message BatchGetRoomMembersResponse {
  // Found members. The server preserves first-seen request order and
  // de-duplicates repeated IDs.
  repeated DirectoryMember members = 1;
}

// Reads authenticated server members.
service ServerMemberService {
  // Lists authenticated server members. Every authenticated user is a server
  // member; admin-sensitive fields stay out of this public row shape.
  rpc ListMembers(ListServerMembersRequest) returns (ListServerMembersResponse);
  // Gets one authenticated server member. Returns NOT_FOUND when the user ID is
  // unknown.
  rpc GetMember(GetServerMemberRequest) returns (GetServerMemberResponse);
  // Gets authenticated server member rows for multiple users.
  rpc BatchGetMembers(BatchGetServerMembersRequest) returns (BatchGetServerMembersResponse);
}

// Reads explicit room members.
service RoomMemberService {
  // Lists explicit members of a room. The caller must be a member of the room.
  rpc ListMembers(ListRoomMembersRequest) returns (ListRoomMembersResponse);
  // Gets one explicit member of a room. The caller must be a member of the
  // room. Returns NOT_FOUND when the target is unknown or not a room member.
  rpc GetMember(GetRoomMemberRequest) returns (GetRoomMemberResponse);
  // Gets explicit room member rows for multiple users. The caller must be a
  // member of the room.
  rpc BatchGetMembers(BatchGetRoomMembersRequest) returns (BatchGetRoomMembersResponse);
}
