syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/presence.proto";
import "chatto/api/v1/user_status.proto";

// Fit mode used when generating transformed user avatar URLs.
enum UserAvatarFitMode {
  // The fit mode was not specified.
  USER_AVATAR_FIT_MODE_UNSPECIFIED = 0;
  // Preserve the whole source image within the requested bounds.
  USER_AVATAR_FIT_MODE_CONTAIN = 1;
  // Fill the requested bounds, cropping when needed.
  USER_AVATAR_FIT_MODE_COVER = 2;
}

// Avatar transform parameters for user profile reads.
message UserAvatarOptions {
  // Avatar width in pixels.
  int32 width = 1 [(buf.validate.field).int32 = {
    gte: 1,
    lte: 4096
  }];
  // Avatar height in pixels.
  int32 height = 2 [(buf.validate.field).int32 = {
    gte: 1,
    lte: 4096
  }];
  // Avatar crop/fit behavior.
  UserAvatarFitMode fit = 3 [(buf.validate.field).enum.defined_only = true];
}

// Public user identity fields.
message User {
  // Stable user ID.
  string id = 1;
  // Login name.
  string login = 2;
  // Display name, when set.
  string display_name = 3;
  // True when the user account has been deleted.
  bool deleted = 4;
  // Avatar image URL, when available.
  optional string avatar_url = 5;
}

// Public user identity fields plus live profile state.
message UserProfile {
  // Public identity fields.
  User user = 1;
  // Current live presence status.
  PresenceStatus presence_status = 2;
  // Custom profile status, when set.
  CustomUserStatus custom_status = 3;
}

// Request one user by stable user ID or login identifier.
message GetUserRequest {
  oneof target {
    // Target stable user ID.
    string user_id = 1 [(buf.validate.field).string.min_len = 1];
    // Target login identifier.
    string login = 3 [(buf.validate.field).string.min_len = 1];
  }
  // Optional avatar URL transform parameters. Omit for the original avatar URL.
  UserAvatarOptions avatar = 2;
}

// Request public user profiles for a set of stable user IDs.
message BatchGetUsersRequest {
  // Required user IDs. Unknown IDs are omitted from the response.
  repeated string user_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      string: {min_len: 1}
    }
  }];
  // Optional avatar URL transform parameters. Omit for the original avatar URL.
  UserAvatarOptions avatar = 2;
}

// Public authenticated user profile response.
message GetUserResponse {
  // Requested user.
  UserProfile user = 1;
}

// Batch public user profile response.
message BatchGetUsersResponse {
  // Found users. The server preserves first-seen request order and
  // de-duplicates repeated IDs.
  repeated UserProfile users = 1;
}

// Provides authenticated public user directory lookups.
service UserDirectoryService {
  // Gets a user by stable ID or login. Returns NOT_FOUND when the user is
  // unknown.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  // Gets public user profiles for multiple users referenced by event-focused
  // payloads.
  rpc BatchGetUsers(BatchGetUsersRequest) returns (BatchGetUsersResponse);
}
