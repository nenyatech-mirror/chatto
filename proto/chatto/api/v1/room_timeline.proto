syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/link_previews.proto";
import "chatto/api/v1/users.proto";
import "google/protobuf/timestamp.proto";

// Related entities included beside timeline events.
//
// Includes avoid repeating the same user data on every event in a page.
message RoomTimelineIncludes {
  // Users keyed by user ID.
  map<string, User> users = 1;
}

// Time-limited URL for a room timeline asset.
//
// Clients should expect these URLs to expire and refresh the timeline data when
// an asset URL is no longer usable.
message RoomTimelineAssetUrl {
  // Signed asset URL.
  string url = 1;
  // Time when the signed URL expires.
  google.protobuf.Timestamp expires_at = 2;
}

// Processing state for a timeline video attachment.
enum RoomTimelineVideoProcessingStatus {
  // The processing status was not specified.
  ROOM_TIMELINE_VIDEO_PROCESSING_STATUS_UNSPECIFIED = 0;
  // Video processing is still running.
  ROOM_TIMELINE_VIDEO_PROCESSING_STATUS_PROCESSING = 1;
  // Video processing completed successfully.
  ROOM_TIMELINE_VIDEO_PROCESSING_STATUS_COMPLETED = 2;
  // Video processing failed.
  ROOM_TIMELINE_VIDEO_PROCESSING_STATUS_FAILED = 3;
}

// One transcoded video rendition.
message RoomTimelineVideoVariant {
  // Quality label for the rendition.
  string quality = 1;
  // Video width in pixels.
  int32 width = 2;
  // Video height in pixels.
  int32 height = 3;
  // Rendition size in bytes.
  int64 size = 4;
  // Signed URL for the rendition.
  RoomTimelineAssetUrl asset_url = 5;
}

// Processing metadata for a video attachment.
//
// Clients can use this object to show upload/transcoding progress and decide
// whether to play a processed variant, show a thumbnail, or display a failure
// state.
message RoomTimelineVideoProcessing {
  // Current processing status.
  RoomTimelineVideoProcessingStatus status = 1;
  // Video duration in milliseconds.
  int64 duration_ms = 2;
  // Source video width in pixels.
  int32 width = 3;
  // Source video height in pixels.
  int32 height = 4;
  // True when the original source asset is currently available.
  bool source_available = 5;
  // Stable reason code for a failed or incomplete processing state.
  string reason_code = 6;
  // Signed URL for the generated thumbnail, when available.
  RoomTimelineAssetUrl thumbnail_asset_url = 7;
  // Available transcoded renditions.
  repeated RoomTimelineVideoVariant variants = 8;
}

// Attachment metadata included with a posted message.
//
// Image and video dimensions are best-effort metadata for layout. Asset URLs can
// be absent while processing is pending or when the source is unavailable.
message RoomTimelineAttachment {
  // Stable attachment ID.
  string id = 1;
  // Original filename.
  string filename = 2;
  // MIME content type.
  string content_type = 3;
  // Image or video width in pixels, when known.
  int32 width = 4;
  // Image or video height in pixels, when known.
  int32 height = 5;
  // Signed URL for the original asset, when available.
  RoomTimelineAssetUrl asset_url = 6;
  // Signed URL for a thumbnail image, when available.
  RoomTimelineAssetUrl thumbnail_asset_url = 7;
  // Video-specific processing metadata, when this attachment is a video.
  RoomTimelineVideoProcessing video_processing = 8;
}

// Aggregated reaction state for one emoji on one event.
//
// This state is scoped to the current event and includes whether the current
// user has reacted with the same emoji.
message RoomTimelineReaction {
  // Emoji or reaction key.
  string emoji = 1;
  // Number of users who reacted with this emoji.
  int32 count = 2;
  // True when the current user reacted with this emoji.
  bool has_reacted = 3;
  // User IDs that reacted with this emoji.
  repeated string user_ids = 4;
}

// Payload for a message-posted timeline event.
//
// The same shape is used for top-level room messages, thread replies, and thread
// echo entries. Thread-related fields let clients render reply counts, thread
// participants, and follow state without additional per-message requests.
message RoomTimelineMessagePosted {
  reserved 3;
  reserved 16;
  reserved "body_present";
  reserved "viewer_is_following_thread_present";

  // Room containing the message.
  string room_id = 1;
  // Message body text, when available. A present empty string is distinct from
  // an absent body.
  optional string body = 2;
  // Attachments sent with the message.
  repeated RoomTimelineAttachment attachments = 4;
  // Link preview extracted for the message, when available.
  LinkPreview link_preview = 5;
  // Time when the message was last edited.
  google.protobuf.Timestamp updated_at = 6;
  // Event ID this message directly replies to, when this is a reply.
  string in_reply_to = 7;
  // Event ID of the root message for the thread this message belongs to.
  string thread_root_event_id = 8;
  // Event ID this event echoes into the current view, when applicable. Echoes
  // allow thread activity to appear in another timeline context.
  string echo_of_event_id = 9;
  // Thread root ID of the echoed event, when applicable.
  string echo_from_thread_root_event_id = 10;
  // Channel timeline event ID for a thread echo, when applicable.
  string channel_echo_event_id = 11;
  // Number of replies in this message's thread.
  int32 reply_count = 12;
  // Creation time of the most recent reply in this message's thread.
  google.protobuf.Timestamp last_reply_at = 13;
  // User IDs that have participated in this message's thread.
  repeated string thread_participant_user_ids = 14;
  // Whether the current user follows this message's thread, when known.
  optional bool viewer_is_following_thread = 15;
  // Reaction summaries for this message.
  repeated RoomTimelineReaction reactions = 17;
}

// Payload for room lifecycle and membership timeline events.
message RoomTimelineRoomEvent {
  // Room affected by the event.
  string room_id = 1;
}

// One event in a room or thread timeline.
//
// Clients should inspect the event oneof to choose the renderer for the event.
message RoomTimelineEvent {
  // Stable event ID.
  string id = 1;
  // Time when the event was created.
  google.protobuf.Timestamp created_at = 2;
  // User ID of the event actor.
  string actor_id = 3;

  // Concrete event payload.
  oneof event {
    // A message was posted.
    RoomTimelineMessagePosted message_posted = 10;
    // The room was created.
    RoomTimelineRoomEvent room_created = 20;
    // The room metadata was updated.
    RoomTimelineRoomEvent room_updated = 21;
    // The room was deleted.
    RoomTimelineRoomEvent room_deleted = 22;
    // The room was archived.
    RoomTimelineRoomEvent room_archived = 23;
    // The room was unarchived.
    RoomTimelineRoomEvent room_unarchived = 24;
    // A user joined the room.
    RoomTimelineRoomEvent user_joined_room = 30;
    // A user left the room.
    RoomTimelineRoomEvent user_left_room = 31;
  }
}

// Cursor page of room or thread timeline events.
//
// Use opaque start_cursor and end_cursor values with before/after requests to
// continue paging in either direction. Clients must treat cursor values as
// server-owned tokens and must not parse or construct them. The has_older and
// has_newer flags tell clients whether another request can extend the current
// window.
message RoomTimelinePage {
  // Events in display order.
  repeated RoomTimelineEvent events = 1;
  // Opaque cursor for the first event in the page.
  string start_cursor = 2;
  // Opaque cursor for the last event in the page.
  string end_cursor = 3;
  // True when older events are available before start_cursor.
  bool has_older = 4;
  // True when newer events are available after end_cursor.
  bool has_newer = 5;
  // Related entities needed to render the page.
  RoomTimelineIncludes includes = 6;
}

// Request for a page of room timeline events.
//
// Omit the cursor to load the initial page. Set before to a previously returned
// start_cursor to page toward older events, or after to a previously returned
// end_cursor to page toward newer events.
message GetRoomEventsRequest {
  // Required. Room whose timeline should be loaded.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Maximum number of events to return. The server may clamp very large limits.
  int32 limit = 2;
  // Cursor direction for paging.
  oneof cursor {
    // Return events older than this opaque cursor.
    string before = 3;
    // Return events newer than this opaque cursor.
    string after = 4;
  }
}

// Response containing one room timeline page.
message GetRoomEventsResponse {
  // Loaded timeline page.
  RoomTimelinePage page = 1;
}

// Request for room timeline events around a specific event.
//
// Use this when a client needs to jump to a known event and render enough
// context around it.
message GetRoomEventsAroundRequest {
  // Required. Room whose timeline should be loaded.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Anchor event ID that should appear in the returned page.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Maximum number of events to return around the anchor.
  int32 limit = 3;
}

// Response containing a room timeline window around a specific event.
message GetRoomEventsAroundResponse {
  // Loaded timeline page.
  RoomTimelinePage page = 1;
  // Zero-based index of the anchor event within page.events.
  int32 target_index = 2;
}

// Request for resolving a message permalink target.
//
// Unlike GetRoomEventsAround, this can resolve thread-only replies that do not
// appear as rows in the room timeline.
message ResolveMessageLinkTargetRequest {
  // Required. Room containing the linked event.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Linked event ID.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
}

// Response describing where a message permalink should land.
message ResolveMessageLinkTargetResponse {
  // Linked event, hydrated with the same shape used by timeline pages.
  RoomTimelineEvent event = 1;
  // Event ID of the thread root when event is a thread-only reply. Empty when
  // the event should open in the room timeline.
  string thread_root_event_id = 2;
  // Related entities needed to render the event.
  RoomTimelineIncludes includes = 3;
}

// Request for a page of events in one thread.
//
// Omit the cursor to load the latest visible part of the thread, including the
// root message. Set before to a previously returned start_cursor to page toward
// older replies, or after to a previously returned end_cursor to page toward
// newer replies without repeating the root message.
message GetThreadEventsRequest {
  // Required. Room containing the thread.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the root message for the thread.
  string thread_root_event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Maximum number of events to return. The server may clamp very large limits.
  int32 limit = 3;
  // Cursor direction for paging.
  oneof cursor {
    // Return thread events older than this opaque cursor.
    string before = 4;
    // Return thread events newer than this opaque cursor.
    string after = 5;
  }
}

// Response containing one thread timeline page.
message GetThreadEventsResponse {
  // Loaded timeline page.
  RoomTimelinePage page = 1;
}

// Request for thread events around a specific event.
//
// Use this when a client needs to jump to a known reply and render surrounding
// thread context.
message GetThreadEventsAroundRequest {
  // Required. Room containing the thread.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the root message for the thread.
  string thread_root_event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Required. Anchor event ID inside the thread. The event should belong to the
  // requested thread.
  string event_id = 3 [(buf.validate.field).string.min_len = 1];
  // Maximum number of events to return around the anchor.
  int32 limit = 4;
}

// Response containing a thread timeline window around a specific event.
message GetThreadEventsAroundResponse {
  // Loaded timeline page.
  RoomTimelinePage page = 1;
  // Zero-based index of the anchor event within page.events.
  int32 target_index = 2;
}

// Reads room and thread timeline pages.
service RoomTimelineService {
  // Returns one page of room timeline events, including related user data needed
  // to render the page.
  rpc GetRoomEvents(GetRoomEventsRequest) returns (GetRoomEventsResponse);
  // Returns a room timeline window centered around a specific event. Use this to
  // open a permalink, search result, or notification target in context.
  rpc GetRoomEventsAround(GetRoomEventsAroundRequest) returns (GetRoomEventsAroundResponse);
  // Resolves a permalink target to either the room timeline or a message
  // thread, including thread-only replies that are not room timeline rows.
  rpc ResolveMessageLinkTarget(ResolveMessageLinkTargetRequest) returns (ResolveMessageLinkTargetResponse);
  // Returns one page of events in a message thread. Initial pages include the
  // thread root message; cursor pages return replies in the requested direction.
  rpc GetThreadEvents(GetThreadEventsRequest) returns (GetThreadEventsResponse);
  // Returns a thread timeline window centered around a specific event. Use this
  // to open a reply from a notification or search result in context.
  rpc GetThreadEventsAround(GetThreadEventsAroundRequest) returns (GetThreadEventsAroundResponse);
}
