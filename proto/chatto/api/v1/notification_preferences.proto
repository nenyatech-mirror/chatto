syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";

// Notification delivery level for a room.
enum NotificationLevel {
  // The level was not specified.
  NOTIFICATION_LEVEL_UNSPECIFIED = 0;
  // Use the inherited default for the room.
  NOTIFICATION_LEVEL_DEFAULT = 1;
  // Do not notify for this room.
  NOTIFICATION_LEVEL_MUTED = 2;
  // Notify according to the normal room rules.
  NOTIFICATION_LEVEL_NORMAL = 3;
  // Notify for every message in the room.
  NOTIFICATION_LEVEL_ALL_MESSAGES = 4;
}

// Current notification preference for a room.
//
// Clients can show both the stored room-level setting and the effective setting
// the server will apply after defaults are resolved.
message GetRoomNotificationPreferenceResponse {
  // Explicit level stored for the current user and room.
  NotificationLevel level = 1;
  // Level after applying defaults and inheritance.
  NotificationLevel effective_level = 2;
}

// Updated notification preference for a room.
//
// The response mirrors the read shape so clients can update local state without
// issuing a second read request.
message SetRoomNotificationLevelResponse {
  // Explicit level stored for the current user and room.
  NotificationLevel level = 1;
  // Level after applying defaults and inheritance.
  NotificationLevel effective_level = 2;
}

// Request for the current user's notification preference in one room.
message GetRoomNotificationPreferenceRequest {
  // Required. Room whose notification preference should be loaded for the current user.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Request to update the current user's notification level in one room.
message SetRoomNotificationLevelRequest {
  // Required. Room whose notification level should be changed for the current user.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. New explicit notification level. Use NOTIFICATION_LEVEL_DEFAULT
  // to return the room to inherited/default behavior.
  NotificationLevel level = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// Reads and updates per-room notification preferences for the current user.
service NotificationPreferencesService {
  // Returns the current user's explicit and effective notification level for a
  // room. Use this before rendering room notification controls so the UI can
  // distinguish inherited defaults from an explicit room override.
  rpc GetRoomNotificationPreference(GetRoomNotificationPreferenceRequest) returns (GetRoomNotificationPreferenceResponse);
  // Sets the current user's explicit notification level for a room and returns
  // the resulting stored and effective levels.
  rpc SetRoomNotificationLevel(SetRoomNotificationLevelRequest) returns (SetRoomNotificationLevelResponse);
}
