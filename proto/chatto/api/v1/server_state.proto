syntax = "proto3";

package chatto.api.v1;

// Authenticated server profile and branding fields.
message ServerProfile {
  // Display name of the Chatto server.
  string name = 1;
  // Optional server logo URL.
  optional string logo_url = 2;
  // Optional server banner URL.
  optional string banner_url = 3;
  // Optional welcome message.
  optional string welcome_message = 4;
  // Optional message of the day.
  optional string motd = 5;
  // Optional server description.
  optional string description = 6;
}

// Permission-derived server capabilities for the authenticated user.
message ServerViewerCapabilities {
  // Whether the user has at least one server-admin permission.
  bool has_any_admin_permission = 1;
  // Whether the user may manage server configuration.
  bool can_manage_server = 2;
  // Whether the user may create a channel room at server scope.
  bool can_create_room = 3;
  // Whether the user may manage at least one room.
  bool can_manage_rooms = 4;
  // Whether any joined channel room has unread messages.
  bool has_unread_rooms = 5;
}

// Request for authenticated server state.
message GetServerStateRequest {}

// Authenticated server state used by the web client and public API clients.
message GetServerStateResponse {
  // Server profile and branding.
  ServerProfile profile = 1;
  // Whether Web Push notifications are fully configured.
  bool push_notifications_enabled = 2;
  // Optional VAPID public key for Web Push registration.
  optional string vapid_public_key = 3;
  // Optional LiveKit URL for voice calls.
  optional string livekit_url = 4;
  // Whether direct email/password registration is enabled.
  bool direct_registration_enabled = 5;
  // Whether video processing is enabled.
  bool video_processing_enabled = 6;
  // Maximum general upload size in bytes.
  int64 max_upload_size = 7;
  // Maximum video upload size in bytes.
  int64 max_video_upload_size = 8;
  // Message edit window in seconds.
  int32 message_edit_window_seconds = 9;
  // Permission-derived state for the authenticated user.
  ServerViewerCapabilities viewer_capabilities = 10;
}

// Provides authenticated server state and current user's server capabilities.
service ServerService {
  // Returns authenticated server state. This RPC requires a logged-in user;
  // public discovery remains available through
  // ServerDiscoveryService.GetServer.
  rpc GetServerState(GetServerStateRequest) returns (GetServerStateResponse);
}
