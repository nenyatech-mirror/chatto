syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/attachments.proto";
import "chatto/api/v1/reactions.proto";
import "chatto/api/v1/room_timeline.proto";

// Attachment bytes submitted with a message post.
//
// Each attachment is uploaded as a room-scoped asset before the message is
// committed. The message service validates per-file limits and permissions.
message MessageAttachmentUpload {
  // Raw file bytes.
  bytes content = 1;
  // Original filename supplied by the client.
  string filename = 2;
  // MIME content type supplied by the client. Empty values are treated as
  // application/octet-stream.
  string content_type = 3;
}

// Link preview metadata accepted when creating a message.
//
// This request-only shape intentionally excludes response-only fields such as
// generated image URLs.
message MessageLinkPreviewInput {
  // Previewed URL.
  string url = 1 [(buf.validate.field).string.min_len = 1];
  // Page or embed title, when selected by the client.
  optional string title = 2;
  // Page or embed description, when selected by the client.
  optional string description = 3;
  // Existing server asset ID for the preview image, when selected by the client.
  optional string image_asset_id = 4;
  // Site name, when known.
  optional string site_name = 5;
  // Embed provider or type, when recognized.
  optional string embed_type = 6;
  // Provider-specific embed ID, when recognized.
  optional string embed_id = 7;
}

// Request to create a message in a room or thread.
message CreateMessageRequest {
  // Required. Room where the message should be created.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Message body text. Required unless attachments or attachment_asset_ids is
  // non-empty.
  string body = 2;
  // Existing room-scoped attachment asset IDs to include with the message.
  repeated string attachment_asset_ids = 3;
  // Event ID of the thread root message when posting a thread reply.
  string thread_root_event_id = 4;
  // Event ID this message replies to for attribution.
  string in_reply_to = 5;
  // True to also echo a thread reply into the main room timeline.
  bool also_send_to_channel = 6;
  // Short-lived token returned by a prior mention confirmation challenge.
  string mention_confirmation_token = 7;
  // Link preview selected by the client.
  MessageLinkPreviewInput link_preview = 8;
  // Browser-uploaded attachments to include with the message.
  repeated MessageAttachmentUpload attachments = 9;
}

// Large mention confirmation details for a message that was not posted.
message MentionConfirmationChallenge {
  // Number of people the message would notify.
  int32 recipient_count = 1;
  // Short-lived token to send back with the same message after user approval.
  string token = 2;
}

// Result of creating a message.
message CreateMessageResponse {
  oneof result {
    // Renderable timeline event for the created message.
    RoomTimelineEvent event = 1;
    // Challenge shown when a message would notify many people.
    MentionConfirmationChallenge mention_confirmation = 2;
  }
  // Related entities needed to render event when a message was created.
  RoomTimelineIncludes includes = 3;
}

// Request to patch a message.
message UpdateMessageRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message to edit.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // New message body text. Omit to preserve the current body.
  optional string body = 3 [(buf.validate.field).string.max_len = 10000];
  // For thread replies, whether a channel echo should exist after saving.
  // Omit to preserve the current echo state.
  optional bool also_send_to_channel = 4;
}

// Result of editing a message.
message UpdateMessageResponse {
  // True when the edit was accepted.
  bool updated = 1;
  // Renderable timeline event after the edit.
  RoomTimelineEvent event = 2;
  // Related entities needed to render event after the edit.
  RoomTimelineIncludes includes = 3;
}

// Request to retract a message.
message DeleteMessageRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message to retract.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of retracting a message.
message DeleteMessageResponse {
  // True when the delete/retract request was accepted.
  bool deleted = 1;
}

// Request to remove one attachment from a message.
message DeleteAttachmentRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message containing the attachment.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Required. Attachment ID to remove from the message.
  string attachment_id = 3 [(buf.validate.field).string.min_len = 1];
}

// Result of removing one attachment from a message.
message DeleteAttachmentResponse {
  // True when the attachment removal was accepted.
  bool deleted = 1;
}

// Request to remove the accepted link preview from a message.
message DeleteLinkPreviewRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message containing the link preview.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Required. URL of the link preview to remove.
  string url = 3 [(buf.validate.field).string.min_len = 1];
}

// Result of removing a link preview from a message.
message DeleteLinkPreviewResponse {
  // True when the link preview removal was accepted.
  bool deleted = 1;
}

// Request to refresh signed attachment URLs for one message.
message RefreshMessageAttachmentUrlsRequest {
  // Required room ID.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required message event ID.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Thumbnail URL options. Defaults are applied when absent.
  AttachmentThumbnailOptions thumbnail = 3;
}

// Response containing fresh signed URLs for the current message attachments.
message RefreshMessageAttachmentUrlsResponse {
  // Fresh URL bundle for each current attachment on the message.
  repeated RefreshedAttachmentUrls attachments = 1;
}

// Request to refresh signed attachment URLs for many messages in one room.
message BatchRefreshMessageAttachmentUrlsRequest {
  // Required room ID.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required message event IDs. Missing, retracted, non-message, and
  // wrong-room event IDs are omitted from the response.
  repeated string event_ids = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      string: {min_len: 1}
    }
  }];
  // Thumbnail URL options. Defaults are applied when absent.
  AttachmentThumbnailOptions thumbnail = 3;
}

// Fresh signed attachment URLs for one visible message.
message RefreshedMessageAttachmentUrls {
  // Message event ID these attachment URLs belong to.
  string event_id = 1;
  // Fresh URL bundle for each current attachment on the message.
  repeated RefreshedAttachmentUrls attachments = 2;
}

// Response containing fresh signed URLs for many visible messages.
message BatchRefreshMessageAttachmentUrlsResponse {
  // Refreshed messages in first-seen request order.
  repeated RefreshedMessageAttachmentUrls messages = 1;
}

// Creates messages in room and thread timelines.
service MessageService {
  // Creates a message for the current user. The user must be a room member and
  // must have message.post for room messages or message.post-in-thread for
  // thread replies. Echoing a thread reply also requires message.echo and
  // message.post.
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse);
  // Edits a message body. Authors can edit their own messages within the edit
  // window. Non-authors need message.manage and cannot change channel echo
  // state.
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  // Retracts a message. Authors can delete their own messages. Non-authors need
  // message.manage.
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  // Removes one attachment from the author's own message.
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (DeleteAttachmentResponse);
  // Removes the accepted link preview from the author's own message.
  rpc DeleteLinkPreview(DeleteLinkPreviewRequest) returns (DeleteLinkPreviewResponse);
  // Refreshes signed URLs for the current attachments on one message.
  // Authentication and room membership are required. Returns NOT_FOUND when the
  // message does not exist, is not a current visible message, or belongs to a
  // different room. Returns an empty attachment list when the message exists
  // but currently has no attachments.
  rpc RefreshMessageAttachmentUrls(RefreshMessageAttachmentUrlsRequest) returns (RefreshMessageAttachmentUrlsResponse);
  // Refreshes signed URLs for the current attachments on multiple messages in
  // one room. Authentication and room membership are required. Missing,
  // retracted, non-message, and wrong-room event IDs are omitted. Results
  // preserve first-seen request order and repeated event IDs are de-duplicated.
  // Existing visible messages with no current attachments are returned with an
  // empty attachment list.
  rpc BatchRefreshMessageAttachmentUrls(BatchRefreshMessageAttachmentUrlsRequest) returns (BatchRefreshMessageAttachmentUrlsResponse);
  // Resolves a permalink target to either the room timeline or a message
  // thread, including thread-only replies that are not room timeline rows.
  // Returns NOT_FOUND when the target message is missing or hidden and
  // PERMISSION_DENIED when the room is inaccessible.
  rpc ResolveMessageLinkTarget(ResolveMessageLinkTargetRequest) returns (ResolveMessageLinkTargetResponse);
  // Adds a reaction to a message. The user must be a room member and have
  // message.react in the target room.
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);
  // Removes a reaction from a message. The user must be a room member and have
  // message.react in the target room.
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);
}
