# Chatto configuration secret
# All environment variables are defined here and sourced by the services.
#
# Usage:
#   1. Copy to secrets.local.yaml
#   2. Replace placeholder values (generate secrets with: openssl rand -hex 32)
#   3. Apply: kubectl apply -f secrets.local.yaml
#
# IMPORTANT: NATS_TOKEN and CHATTO_NATS_CLIENT_TOKEN must have the same value!

apiVersion: v1
kind: Secret
metadata:
  name: chatto-config
  namespace: chatto
type: Opaque
stringData:
  # NATS authentication (used by both NATS server and Chatto client)
  NATS_TOKEN: "your-nats-token-here"

  # Chatto configuration
  CHATTO_NATS_EMBEDDED_ENABLED: "false"
  CHATTO_NATS_CLIENT_URL: "nats://nats:4222"
  CHATTO_NATS_CLIENT_AUTH_METHOD: "token"
  CHATTO_NATS_CLIENT_TOKEN: "your-nats-token-here"  # Must match NATS_TOKEN
  CHATTO_WEBSERVER_URL: "https://chat.example.com"
  CHATTO_WEBSERVER_PORT: "4000"
  CHATTO_WEBSERVER_COOKIE_SIGNING_SECRET: "your-cookie-secret-here"
  CHATTO_CORE_SECRET_KEY: "your-core-secret-here"
  CHATTO_CORE_ASSETS_SIGNING_SECRET: "your-assets-secret-here"
  CHATTO_LOG_LEVEL: "info"
  CHATTO_LOG_FORMAT: "json"

  # SMTP configuration (optional - uncomment to enable)
  # CHATTO_SMTP_ENABLED: "true"
  # CHATTO_SMTP_HOST: "smtp.example.com"
  # CHATTO_SMTP_PORT: "587"
  # CHATTO_SMTP_TLS: "mandatory"
  # CHATTO_SMTP_USERNAME: "your-smtp-username"
  # CHATTO_SMTP_PASSWORD: "your-smtp-password"
  # CHATTO_SMTP_FROM: "noreply@example.com"
