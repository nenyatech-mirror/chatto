version: 2
project_name: chatto

before:
  hooks:
    - mise build-frontend

builds:
  - env:
      - CGO_ENABLED=0
    dir: ./cli
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  # release-please now owns the changelog (CHANGELOG.md + the GitHub
  # Release body). Don't let GoReleaser generate or attach a second one.
  disable: true

dockers:
  - image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - docker-entrypoint.sh
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/chattocorp/chatto"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    use: buildx
    goarch: amd64
    goos: linux
  - image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - docker-entrypoint.sh
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/chattocorp/chatto"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    use: buildx
    goarch: arm64
    goos: linux

docker_manifests:
  - name_template: "ghcr.io/chattocorp/chatto:{{ .Version }}"
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"
  - name_template: "ghcr.io/chattocorp/chatto:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"
  - name_template: "ghcr.io/chattocorp/chatto:latest"
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"

## R2 blob upload disabled until R2 API tokens are configured
## See: https://github.com/chattocorp/chatto/actions/runs/21843246346
# blobs:
#   - provider: s3
#     bucket: "{{ .Env.R2_BUCKET }}"
#     region: auto
#     endpoint: "https://{{ .Env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
#     directory: "releases/{{ .Version }}"
#     include_meta: true

release:
  github:
    owner: chattocorp
    name: chatto
  # release-please creates the GitHub Release with its changelog body.
  # GoReleaser must NOT overwrite it — `keep-existing` makes GoReleaser
  # only attach artifacts to the existing release.
  mode: keep-existing
