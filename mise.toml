[tools]
actionlint = "latest"
buf = "latest"
go = "1.26.2"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "v1.36.11"
goreleaser = "latest"
node = "22"
tilt = "latest"

[env]
_.file = '.env'

# =============================================================================
# Setup
# =============================================================================

[tasks.setup]
description = "Set up the development environment"
run = { task = "deps" }

# =============================================================================
# Dependencies
# =============================================================================

[tasks.deps-cli]
description = "Install Go dependencies"
dir = "cli"
run = "go mod download"
sources = ["go.mod", "go.sum"]

[tasks.deps-frontend]
description = "Install frontend dependencies"
dir = "frontend"
run = "pnpm install"
# package.json also contains app metadata and scripts; the lockfile is the
# dependency-resolution input that should trigger installs.
sources = ["pnpm-lock.yaml", "pnpm-workspace.yaml", ".npmrc"]

[tasks.deps]
description = "Install all dependencies"
run = { task = "deps-*" }

# =============================================================================
# Code Generation
# =============================================================================

[tasks.codegen-proto]
description = "Generate Go code from protobuf schemas"
dir = "proto"
run = "buf generate"

[tasks.codegen-cli]
description = "Generate GraphQL code using gqlgen"
depends = ["deps-cli", "codegen-proto"]
dir = "cli"
run = "go generate ./..."

[tasks.codegen-frontend]
description = "Generate Frontend code (e.g. GraphQL types)"
depends = ["deps-frontend"]
dir = "frontend"
run = "pnpm codegen"

[tasks.codegen-emoji]
description = "Generate Go emoji map from gemoji npm package"
depends = ["deps-frontend"]
run = "node tools/gen-emoji-map.mjs"

[tasks.codegen-types]
description = "Generate TypeScript types from Go using tygo"
depends = ["deps-cli"]
dir = "cli"
run = "go tool tygo generate"

[tasks.codegen]
description = "Run all code generation tasks"
run = { task = "codegen-*" }

# =============================================================================
# Build
# =============================================================================

[tasks.build]
description = "Build the entire project for all architectures"
run = [{ task = "build-*" }, "ls -lah cli/bin/*"]

[tasks.build-frontend]
description = "Build the frontend application"
depends = ["deps-frontend"]
dir = "frontend"
run = [
    "pnpm svelte-kit sync",
    "pnpm build",
    "touch build/.mise-build-stamp",
    "rm -rf ../cli/internal/http_server/.client",
    "cp -r build ../cli/internal/http_server/.client",
    "touch ../cli/internal/http_server/.client/.gitkeep",
]
sources = [
    ".npmrc",
    "package.json",
    "pnpm-lock.yaml",
    "pnpm-workspace.yaml",
    "src/**/*",
    "!src/**/*.spec.*",
    "!src/**/*.test.*",
    "!src/**/*.stories.*",
    "!src/**/*TestHarness.svelte",
    "static/**/*",
    "svelte.config.js",
    "tsconfig.json",
    "vite.config.ts",
]
outputs = ["build/.mise-build-stamp", "../cli/internal/http_server/.client/.gitkeep"]

[tasks.build-dev-cli]
description = "Build the development CLI application for the current architecture"
depends = ["deps-cli", "build-frontend"]
dir = "cli"
run = "go build -tags bootstrap -o bin/chatto ."
sources = [
    "go.mod",
    "go.sum",
    "**/*.go",
    "!**/*_test.go",
    "cmd/LICENSE",
    "cmd/NOTICE",
    "internal/graph/*.graphqls",
    "internal/http_server/.client/**/*",
]
outputs = ["bin/chatto"]

[tasks.build-e2e-server]
description = "Build the E2E test server binary with dev bootstrap and test endpoints enabled"
depends = ["deps-cli", "build-frontend"]
dir = "cli"
# `bootstrap` enables the [bootstrap] section in chatto.toml, which seeds
# the e2eadmin user the harness logs in as. `test_endpoints` exposes the
# test-only HTTP endpoints (e.g. /auth/test/create-user) used by per-test
# fixtures. Deliberately scoped — the e2e binary should NOT pull in any
# future broader dev-only code that might land under a separate tag.
run = "CGO_ENABLED=0 go build -tags 'bootstrap test_endpoints' -ldflags '-s -w' -o ../frontend/e2e/fixtures/bin/chatto ."
sources = ["**/*.go", "internal/http_server/.client/**/*"]
outputs = ["../frontend/e2e/fixtures/bin/chatto"]

[tasks.storybook]
description = "Run the Storybook design-system catalog"
depends = ["deps-frontend"]
dir = "frontend"
run = "pnpm storybook"

[tasks.dev-backend]
description = "Build and run the local development backend"
dir = "cli"
run = "go build -tags bootstrap -o bin/chatto-dev . && exec ./bin/chatto-dev start"

[tasks.dev-frontend]
description = "Run the local development frontend"
dir = "frontend"
run = "exec ./node_modules/.bin/vite dev"

[tasks.dev-frontend-codegen]
description = "Run frontend GraphQL codegen in watch mode"
dir = "frontend"
run = "exec ./node_modules/.bin/graphql-codegen --watch"

[tasks.dev]
description = "Run the local Tilt development stack"
raw = true
run = """
if [ -n "${TILT_PORT:-}" ]; then
  exec tilt up --stream --port "$TILT_PORT"
fi

exec tilt up --stream
"""

[tasks.chatto]
description = "Build and run the bundled Chatto CLI"
depends = ["build-dev-cli"]
dir = "cli"
usage = '''
arg "[args]" var=#true
'''
env = {
  CHATTO_WEBSERVER_PORT = "{{env.CONDUCTOR_PORT | default(value='4000')}}",
  CHATTO_WEBSERVER_URL = "http://localhost:{{env.CONDUCTOR_PORT | default(value='4000')}}",
  CHATTO_NATS_EMBEDDED_PORT = "{{env.CONDUCTOR_PORT | default(value='4000') | int + 1}}",
  CHATTO_NATS_CLIENT_URL = "nats://localhost:{{env.CONDUCTOR_PORT | default(value='4000') | int + 1}}",
  CHATTO_METRICS_ENABLED = "true",
  CHATTO_METRICS_BIND_ADDRESS = "127.0.0.1",
  CHATTO_METRICS_PORT = "{{env.CONDUCTOR_PORT | default(value='4000') | int + 2}}",
  CHATTO_METRICS_PATH = "/metrics",
}
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ -z "${usage_args:-}" ]; then
  exec bin/chatto run
fi

eval "chatto_args=($usage_args)"
exec bin/chatto "${chatto_args[@]}"
"""

# =============================================================================
# Testing
# =============================================================================

[tasks.test-cli]
description = "Run CLI tests"
depends = ["deps-cli", "build-frontend"]
dir = "cli"
run = "go test -tags test_endpoints ./..."
sources = ["**/*.go"]

[tasks.test-cli-shutdown]
description = "Run backend process shutdown integration tests"
depends = ["deps-cli"]
dir = "cli"
run = "go test -tags integration ./cmd -run TestRunCommandShutsDownOnSignals -count=1 -timeout 2m"
sources = ["**/*.go"]

[tasks.lint-frontend]
description = "Run TypeScript and ESLint checks on frontend"
depends = ["deps-frontend"]
dir = "frontend"
run = ["pnpm check", "pnpm lint"]

[tasks.lint]
description = "Run linters"
run = [{ task = "lint-*" }]

[tasks.test-frontend]
description = "Run frontend unit tests"
depends = ["deps-frontend"]
dir = "frontend"
run = "pnpm vitest --run"

[tasks.test-e2e]
description = "Run E2E tests"
depends = ["deps-frontend", "build-e2e-server"]
dir = "frontend"
run = "pnpm exec playwright test"

[tasks.test]
description = "Run all tests"
run = [{ task = "test-cli" }, { task = "test-frontend" }, { task = "test-e2e" }]

# =============================================================================
# Utility
# =============================================================================

[tasks.run]
description = "Compile and run the project"
depends = ["build"]
dir = "cli"
run = "bin/chatto run"

[tasks.clean]
description = "Clean all build artifacts"
run = [
    "rm -rf cli/bin/*",
    "rm -rf cli/internal/http_server/.client",
    "rm -rf frontend/build",
]

[tasks.reset-config]
description = "Delete and reinitialize chatto.toml"
confirm = "Are you sure you want to re-initialize chatto.toml? This will delete your current configuration."
dir = "cli"
run = ["rm chatto.toml", "go run . init"]

[tasks.reset-data]
description = "Reset the development environment (NATS data etc.)"
confirm = "Are you sure you want to reset the development environment? This will delete all data."
dir = "cli"
run = ["rm -rf data"]

[tasks.docs]
description = "Start pkgsite documentation server for the CLI"
dir = "cli"
run = """
echo "Starting pkgsite documentation server..."
echo "Browse to: http://localhost:6060/hmans.de/chatto"
pkgsite -http=localhost:6060 .
"""

[tasks.verify-docker]
description = "Validate Docker, GoReleaser, and image workflow wiring"
run = """
set -euo pipefail

goreleaser check

actionlint .github/workflows/*.yml

docker buildx build --check --build-arg TARGETARCH=amd64 -f docker/Dockerfile.dev .
docker buildx build --check -f docker/Dockerfile.frontend.dev frontend
docker buildx build --check -f docker/Dockerfile.frontend.prebuilt .

tmp="$(mktemp -d /tmp/chatto-docker-verify.XXXXXX)"
trap 'rm -rf "$tmp"' EXIT
context="$tmp/linux-amd64"
mkdir -p "$context/docker"
cp docker/Dockerfile.goreleaser "$context/Dockerfile"
cp docker/docker-entrypoint.sh "$context/docker/docker-entrypoint.sh"
printf '#!/bin/sh\necho chatto dummy\n' > "$context/chatto"
chmod +x "$context/chatto"
docker buildx build --build-arg TARGETARCH=amd64 -f "$context/Dockerfile" "$context"
"""

# =============================================================================
# Versioning
# =============================================================================
# Versions are managed by release-please (.release-please-config.json).
# Land a conventional-commit PR on main → release-please opens a rolling
# Release PR → merge it to cut the tag, which triggers ci.yml's release
# job. No `mise bump` needed.
