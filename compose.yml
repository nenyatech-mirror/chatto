services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app/cli
    command: ["watchexec", "-r", "--poll", "500ms", "-e", "go", "--", "go", "run", "-tags", "bootstrap", ".", "start"]
    environment:
      CHATTO_WEBSERVER_URL: https://${COMPOSE_PROJECT_NAME}.orb.local
      # Shared dev infrastructure runs in OrbStack's Kubernetes (see the
      # umbrella's Tiltfile). The hostnames below are reachable from inside
      # OrbStack's Docker side too — both stacks share the same VM.
      CHATTO_SMTP_HOST: mailpit.k8s.orb.local
      CHATTO_SMTP_PORT: "1025"
      CHATTO_LIVEKIT_URL: wss://livekit.k8s.orb.local
      CHATTO_LIVEKIT_API_KEY: devkey
      CHATTO_LIVEKIT_API_SECRET: devsecret
      # Dev bootstrap (devuser, dev@dev.com, devpassword, plus alice/bob and
      # the Engineering/Lounge spaces) is now declared in cli/chatto.toml under
      # [bootstrap]. The bootstrap-tagged binary applies it on startup; release
      # binaries ignore the section.
    volumes:
      - ./cli:/app/cli
      # Shared host-side caches (see comment at the bottom of this file).
      - ${HOME}/.cache/chatto-dev/go-mod:/go/pkg/mod
      - ${HOME}/.cache/chatto-dev/go-build:/root/.cache/go-build
      - chatto-data:/app/cli/data

  frontend:
    image: node:22-alpine
    working_dir: /app
    labels:
      dev.orbstack.http-port: 5173
      dev.orbstack.domains: ${COMPOSE_PROJECT_NAME}.orb.local
    command: sh -c "corepack enable pnpm && pnpm config set store-dir /pnpm-store && CI=true pnpm install && pnpm dev --host"
    environment:
      CHATTO_BACKEND_URL: http://app:4000
    volumes:
      - ./frontend:/app
      # node_modules stays per-project: it's branch-specific, unlike the pnpm store.
      - node_modules:/app/node_modules
      - ${HOME}/.cache/chatto-dev/pnpm-store:/pnpm-store

# We bind-mount the Go module cache, Go build cache, and pnpm store from
# ~/.cache/chatto-dev on the host so they're shared across every Conductor
# workspace (each workspace runs its own compose project, which would
# otherwise get its own empty set of named volumes and refetch/rebuild
# everything from scratch). All three are content-addressed and safe to
# share. Bind mounts (rather than named volumes) mean `compose down -v`
# from one workspace won't wipe the caches for the others, and there's no
# `docker volume create` bootstrap step needed — Docker auto-creates the
# host directories on first run.
volumes:
  node_modules:
  chatto-data:
