server {
  listen 8080;
  server_name _;

  # Preserve the public origin when a reverse proxy fronts this container.
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ =404;
  }

  error_page 404 /404.html;
}
