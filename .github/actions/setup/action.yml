name: "Setup Environment"
description: "Sets up mise with caching, then installs Go, Node.js, pnpm, and dependencies"
inputs:
  install-ffmpeg:
    description: "Install ffmpeg (only needed for E2E tests with video processing)"
    required: false
    default: "false"
  install-cli-deps:
    description: "Install Go/CLI dependencies"
    required: false
    default: "true"
  install-frontend-deps:
    description: "Install frontend dependencies"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Cache Go modules
      if: inputs.install-cli-deps == 'true'
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: go-mod-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cli/go.sum') }}
        restore-keys: |
          go-mod-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache Go build artifacts
      if: inputs.install-cli-deps == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/go-build
        key: go-build-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cli/go.sum', 'cli/**/*.go', 'proto/**/*.go', 'proto/**/*.proto', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'apps/frontend/package.json', 'apps/frontend/src/**', 'apps/frontend/static/**', 'apps/frontend/svelte.config.js', 'apps/frontend/tsconfig.json', 'apps/frontend/vite.config.ts', 'mise.toml') }}
        restore-keys: |
          go-build-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}-
          go-build-${{ runner.os }}-${{ runner.arch }}-

    # mise-action installs mise and the tools defined in mise.toml (Go, Node)
    # with automatic caching of the tool installations
    - name: Setup mise
      uses: jdx/mise-action@v4
      with:
        experimental: true

    # pnpm is not available as a mise plugin, so install via npm (comes with Node)
    - name: Install pnpm
      if: inputs.install-frontend-deps == 'true'
      uses: pnpm/action-setup@v5

    - name: Resolve pnpm store path
      if: inputs.install-frontend-deps == 'true'
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      if: inputs.install-frontend-deps == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ runner.arch }}-

    - name: Install ffmpeg (required for video processing e2e tests)
      if: inputs.install-ffmpeg == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ffmpeg

    - name: Set up CLI
      if: inputs.install-cli-deps == 'true'
      shell: bash
      run: mise setup-cli

    - name: Set up Frontend
      if: inputs.install-frontend-deps == 'true'
      shell: bash
      run: mise setup-frontend
