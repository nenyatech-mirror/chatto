name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build frontend
        run: mise build-frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: cli/internal/http_server/.client
          include-hidden-files: true
          retention-days: 1

  test-frontend-unit:
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run frontend unit tests
        run: cd frontend && pnpm vitest --run

  test-cli:
    needs: build
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: cli/internal/http_server/.client

      - name: Run Go tests
        run: cd cli && go test -tags test_endpoints ./...

  test-e2e:
    needs: build
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-ffmpeg: "true"

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: cli/internal/http_server/.client

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Build E2E server
        # Mirrors `mise build-e2e-server` (intentionally not delegating to the
        # mise task because it would re-run build-frontend even though CI
        # already downloaded the artifact above). Keep tags in sync with the
        # build-e2e-server task in mise.toml: `bootstrap` compiles in the
        # [bootstrap] applier that seeds the e2eadmin user; `test_endpoints`
        # exposes the /auth/test/* endpoints used by per-test fixtures.
        run: cd cli && go build -tags 'bootstrap test_endpoints' -o ../frontend/e2e/fixtures/bin/chatto .

      - name: Run E2E tests
        run: cd frontend && pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  release:
    needs: [test-cli, test-e2e, test-frontend-unit]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # needed by GoReleaser to create changelog
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use a PAT so the release is authored by a user account rather
          # than github-actions[bot]. Bot-authored releases don't get
          # GitHub's autolink rendering for commit SHAs and #NNN PR refs.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/chattocorp/chatto-client:${{ steps.version.outputs.version }}
            ghcr.io/chattocorp/chatto-client:latest
